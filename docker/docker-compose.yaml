services:
  narrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8005:8005"
    env_file:
      - ../.env
    volumes:
      - ../defaults/lore:/app/defaults/lore
      - ../defaults/persona:/app/defaults/persona:ro
      - ../defaults/writing-styles:/app/defaults/writing-styles:ro
      - ../defaults/forge-prompts:/app/defaults/forge-prompts:ro
      - ../story:/app/story
      - ../writing:/app/writing
      - ../chats:/app/chats
      - ../code-requests:/app/code-requests
      - ../forge:/app/forge
      - ../portraits:/app/portraits:ro
    environment:
      - CONFIG_PATH=/app/config.yaml
    restart: unless-stopped
