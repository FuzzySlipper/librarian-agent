services:
  narrator:
    build: .
    ports:
      - "8005:8005"
    env_file:
      -../.env
    volumes:
      -../lore/:/app/lore
      -../story/:/app/story
      -../writing/:/app/writing
      -../chats/:/app/chats
      -../code-requests/:/app/code-requests
      -../forge/:/app/forge
      -../forge-prompts/:/app/forge-prompts:ro
      -../persona/:/app/persona:ro
      -../writing-styles/:/app/writing-styles:ro
      -../portraits/:/app/portraits:ro
    environment:
      - CONFIG_PATH=/app/config.yaml
    restart: unless-stopped
