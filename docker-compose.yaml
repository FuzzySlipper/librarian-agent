services:
  narrator:
    build: .
    ports:
      - "8005:8005"
    env_file:
      - ${CONTENT_DIR:-.}/.env
    volumes:
      - ${CONTENT_DIR:-.}/lore/:/app/lore:ro
      - ${CONTENT_DIR:-.}/story/:/app/story
      - ${CONTENT_DIR:-.}/writing/:/app/writing
      - ${CONTENT_DIR:-.}/chats/:/app/chats
      - ${CONTENT_DIR:-.}/code-requests/:/app/code-requests
      - ${CONTENT_DIR:-.}/persona/:/app/persona:ro
      - ${CONTENT_DIR:-.}/writing-styles/:/app/writing-styles:ro
      - ${CONTENT_DIR:-.}/portraits/:/app/portraits:ro
    environment:
      - CONFIG_PATH=/app/config.yaml
    restart: unless-stopped
