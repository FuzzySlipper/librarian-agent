services:
  narrator:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ${CONTENT_DIR:-.}/.env
    volumes:
      - ${CONTENT_DIR:-.}/lore/:/app/lore:ro
      - ${CONTENT_DIR:-.}/story/:/app/story
      - ${CONTENT_DIR:-.}/code-requests/:/app/code-requests
    environment:
      - CONFIG_PATH=/app/config.yaml
    restart: unless-stopped
